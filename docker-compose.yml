version: '3.8'

services:
  # Database Service
  mongodb:
    image: mongo:6.0
    container_name: form_management_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Backend API Service
  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: form_management_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/form_management
      - NODE_ENV=development
    depends_on:
      - mongodb
    restart: unless-stopped

  # Frontend Web Service
  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: form_management_frontend
    ports:
      - "5173:80" # Map Nginx port 80 to Vite default port 5173 for familiarity
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
